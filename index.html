<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Производство KAMNI Jewelry</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-ivory-paper: #f3f2ec;
      --color-sage-mist: #e3e4df;
      --color-bone-gray: #cbc9bd;
      --color-ink-black: #131313;
      --color-ember-coral: #f68e6d;

      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;

      --radius: 5px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--color-ivory-paper);
      color: var(--color-ink-black);
      font-family: var(--font-sans);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .page {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      flex: 1 0 auto;
      padding: clamp(33px, 7vw, 83px) clamp(25px, 7vw, 83px) clamp(50px, 8vw, 83px);
    }

    /* Editorial display heading — Playfair Display, tight, left-aligned */
    .hero__title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(44px, 8.6vw, 132px);
      line-height: 1;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .hero__subtitle {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: clamp(17px, 2.2vw, 22px);
      line-height: 1.2;
      max-width: 34ch;
      margin: clamp(17px, 2.5vw, 25px) 0 0;
    }

    /* Stage list — flat, hairline sage dividers, no shadows */
    .stages {
      margin: clamp(44px, 7vw, 83px) 0 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--color-sage-mist);
    }

    .stages__item {
      display: flex;
      align-items: baseline;
      gap: clamp(17px, 3vw, 33px);
      padding: clamp(17px, 2.6vw, 25px) 0;
      border-bottom: 1px solid var(--color-sage-mist);
    }

    .stages__num {
      flex: none;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 13px;
      line-height: 1.1;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
      color: var(--color-bone-gray);
      min-width: 2ch;
    }

    .stages__name {
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: clamp(22px, 3.4vw, 33px);
      line-height: 1.1;
    }

    /* Warm footer — sole chromatic surface, closing gesture */
    .footer {
      flex: none;
      height: clamp(50px, 8vw, 67px);
      background: var(--color-ember-coral);
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1 class="hero__title">Производство KAMNI&nbsp;Jewelry</h1>
      <p class="hero__subtitle">Полный цикл изготовления ювелирных изделий&nbsp;— Дубай</p>
    </header>

    <ol class="stages">
      <li class="stages__item"><span class="stages__num">01</span><span class="stages__name">CAD-моделирование</span></li>
      <li class="stages__item"><span class="stages__num">02</span><span class="stages__name">Литьё</span></li>
      <li class="stages__item"><span class="stages__num">03</span><span class="stages__name">Монтировка</span></li>
      <li class="stages__item"><span class="stages__num">04</span><span class="stages__name">Закрепка</span></li>
      <li class="stages__item"><span class="stages__num">05</span><span class="stages__name">Полировка</span></li>
      <li class="stages__item"><span class="stages__num">06</span><span class="stages__name">Финишная обработка</span></li>
    </ol>
  </main>

  <footer class="footer" aria-hidden="true"></footer>
</body>
</html>
