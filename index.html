<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAMNI — ювелирное производство</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-ivory-paper: #f3f2ec;
      --color-sage-mist: #e3e4df;
      --color-ink-black: #131313;
      --color-ember-coral: #f68e6d;

      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--color-ivory-paper);
      color: var(--color-ink-black);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Full first screen, content vertically centered, left-aligned with generous margin */
    .stage {
      position: relative;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 clamp(25px, 8vw, 120px);
      overflow: hidden;
    }

    /* Watermark — single thin outline gem cut, sage on ivory, barely visible */
    .watermark {
      position: absolute;
      top: 50%;
      right: -6%;
      transform: translateY(-50%);
      width: min(82vh, 62vw);
      aspect-ratio: 1 / 1;
      z-index: 0;
      pointer-events: none;
      opacity: 0.75;
    }
    .watermark svg { width: 100%; height: 100%; display: block; }

    .content { position: relative; z-index: 1; }

    .eyebrow {
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 13px;
      line-height: 1.1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 clamp(20px, 3.5vh, 40px);
    }

    .title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(72px, 22vw, 180px);
      line-height: 1;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .slogan {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.1;
      margin: clamp(14px, 2.5vh, 26px) 0 0;
      max-width: 26ch;
    }

    /* Thin ember coral strip — closing gesture */
    .footer {
      flex: 0 0 auto;
      height: clamp(10px, 1.8vh, 18px);
      background: var(--color-ember-coral);
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="watermark" aria-hidden="true">
      <svg viewBox="0 0 400 400" fill="none" focusable="false" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#e3e4df" stroke-width="1" fill="none" vector-effect="non-scaling-stroke">
          <circle cx="200" cy="200" r="150" vector-effect="non-scaling-stroke"/>
          <polygon points="261,225.3 225.3,261 174.7,261 139,225.3 139,174.7 174.7,139 225.3,139 261,174.7" vector-effect="non-scaling-stroke"/>
          <line x1="261" y1="225.3" x2="350" y2="200" vector-effect="non-scaling-stroke"/>
          <line x1="261" y1="225.3" x2="306.1" y2="306.1" vector-effect="non-scaling-stroke"/>
          <line x1="225.3" y1="261" x2="306.1" y2="306.1" vector-effect="non-scaling-stroke"/>
          <line x1="225.3" y1="261" x2="200" y2="350" vector-effect="non-scaling-stroke"/>
          <line x1="174.7" y1="261" x2="200" y2="350" vector-effect="non-scaling-stroke"/>
          <line x1="174.7" y1="261" x2="93.9" y2="306.1" vector-effect="non-scaling-stroke"/>
          <line x1="139" y1="225.3" x2="93.9" y2="306.1" vector-effect="non-scaling-stroke"/>
          <line x1="139" y1="225.3" x2="50" y2="200" vector-effect="non-scaling-stroke"/>
          <line x1="139" y1="174.7" x2="50" y2="200" vector-effect="non-scaling-stroke"/>
          <line x1="139" y1="174.7" x2="93.9" y2="93.9" vector-effect="non-scaling-stroke"/>
          <line x1="174.7" y1="139" x2="93.9" y2="93.9" vector-effect="non-scaling-stroke"/>
          <line x1="174.7" y1="139" x2="200" y2="50" vector-effect="non-scaling-stroke"/>
          <line x1="225.3" y1="139" x2="200" y2="50" vector-effect="non-scaling-stroke"/>
          <line x1="225.3" y1="139" x2="306.1" y2="93.9" vector-effect="non-scaling-stroke"/>
          <line x1="261" y1="174.7" x2="306.1" y2="93.9" vector-effect="non-scaling-stroke"/>
          <line x1="261" y1="174.7" x2="350" y2="200" vector-effect="non-scaling-stroke"/>
        </g>
      </svg>
    </div>

    <div class="content">
      <p class="eyebrow">Ювелирное производство — Дубай</p>
      <h1 class="title">KAMNI</h1>
      <p class="slogan">[все очень круто, но нужно переделать]</p>
    </div>
  </main>

  <footer class="footer" aria-hidden="true"></footer>
</body>
</html>
